name: 💬 사용 문의 / 도메인 컨설팅
description: 사용법 질문이나 MSA 설계 컨설팅을 요청합니다
title: "[Question] "
labels: ["question"]
body:
  - type: textarea
    id: context
    attributes:
      label: 상황 설명
      placeholder: |
        예) 결제 BC 와 주문 BC 사이에 강결합이 의심되는데, 이 도구로 어떻게 분석할 수 있을까요?
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: 주제
      options:
        - 이벤트 스토밍 / 도메인 모델링
        - 헥사고날 / 포트·어댑터
        - Saga / 분산 트랜잭션
        - API Gateway / 인증
        - CQRS / Outbox / 이벤트 소싱
        - 도구 사용법 (UI / 출력)
        - AI 어시스트
        - 기타
